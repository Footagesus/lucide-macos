name: Build

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-26

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode_26.3.app

            - name: Build Archive
              run: |
                  xcodebuild archive \
                    -scheme "lucide-macos" \
                    -project lucide-macos.xcodeproj \
                    -configuration Release \
                    -archivePath build/LucideIcons.xcarchive \
                    CODE_SIGN_IDENTITY="" \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO \
                    SKIP_INSTALL=NO

            - name: Copy App
              run: |
                  cp -r "build/LucideIcons.xcarchive/Products/Applications/Lucide Icons.app" .

            - name: Create DMG
              run: |
                  hdiutil create -volname "Lucide Icons" \
                    -srcfolder "Lucide Icons.app" \
                    -ov -format UDZO \
                    LucideIcons-${{ github.ref_name }}.dmg

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: LucideIcons-${{ github.ref_name }}.dmg
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
