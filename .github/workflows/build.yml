name: Build

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode_16.2.app

            - name: Build Archive
              run: |
                  xcodebuild archive \
                    -scheme "lucide-macos" \
                    -project lucide-macos.xcodeproj \
                    -configuration Release \
                    -archivePath build/LucideIcons.xcarchive \
                    CODE_SIGN_IDENTITY="" \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO

            - name: Export App
              run: |
                  xcodebuild -exportArchive \
                    -archivePath build/LucideIcons.xcarchive \
                    -exportPath build/export \
                    -exportOptionsPlist ExportOptions.plist

            - name: Zip App
              run: |
                  cd build/export
                  zip -r ../../LucideIcons-${{ github.ref_name }}.zip "Lucide Icons.app"

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: LucideIcons-${{ github.ref_name }}.zip
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
