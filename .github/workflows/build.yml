name: Build

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: macos-26.3

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Select Xcode
              run: sudo xcode-select -s /Applications/Xcode_26.3.app

            - name: Build Archive
              run: |
                  xcodebuild archive \
                      -scheme "lucide-macos" \
                      -project lucide-macos.xcodeproj \
                      -configuration Release \
                      -archivePath build/LucideIcons.xcarchive \
                      CODE_SIGN_IDENTITY="" \
                      CODE_SIGNING_REQUIRED=NO \
                      CODE_SIGNING_ALLOWED=NO \
                      ASSETCATALOG_COMPILER_APPICON_NAME=Lucide

            - name: Export App
              run: |
                  xcodebuild -exportArchive \
                    -archivePath build/LucideIcons.xcarchive \
                    -exportPath build/export \
                    -exportOptionsPlist ExportOptions.plist

            - name: Zip App
              run: |
                  cd build/export
                  zip -r ../../LucideIcons-${{ github.ref_name }}.zip "Lucide Icons.app"

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: LucideIcons-${{ github.ref_name }}.zip
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
